<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Proyecto 1</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="contenedor">
        <h1>Simulación de Péndulo Simple</h1>

        <div class="inputs">
            <label>Ángulo Inicial (grados)</label>
            <input type="number" id="angulo" value="45">

            <label>Velocidad Angular Inicial</label>
            <input type="number" id="velocidad" value="0">

            <label>Paso h</label>
            <input type="number" id="h" value="0.01" step="0.01">

            <label>Tiempo Total</label>
            <input type="number" id="tiempo" value="1">

            <button onclick="simular()">Presiona pa' que tin</button>
        </div>

        <canvas id="grafica"></canvas>

        <div id="resultados"></div>
    </div>

    <script src="script.js"></script>

</body>

</html>
